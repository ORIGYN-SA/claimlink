default:
  image: registry.bochslerfinance.com/runners-images/dfinity-canisters:0.29.0
  interruptible: true
  before_script:
    - dfx --version
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure
      - runner_unsupported
      - unknown_failure

cache:
  - key: "dfx-$CI_COMMIT_REF_SLUG"
    paths:
      - .dfx

stages:
  - preparation
  - lint
  - build
  - test
  - integration_testing
  - deploy

include:
  # Templates:
  - local: scripts/ci-cd/.node_template.yml
  - local: scripts/ci-cd/.rust_template.yml
  - local: scripts/ci-cd/.dfx_templates.yml
  # Frontend linters:
  - local: scripts/ci-cd/.frontend_linter.yml
    inputs:
      src-folder: claimlink_dashboard
  # Unit tests
  - local: scripts/ci-cd/.libraries_unit_test_coverage.yml
  # - local: scripts/ci-cd/.canister_unit_test_coverage.yml
  #   inputs:
  #     src-folder: claimlink
  # Integration tests
  - local: scripts/ci-cd/.integration_tests.yml
  # Canister builds
  - local: scripts/ci-cd/.canister_builds.yml
    inputs:
      src-folder: claimlink
  # Frontend builds
  - local: scripts/ci-cd/.frontend_builds.yml
    inputs:
      src-folder: claimlink_dashboard
  # Backend deployments
  - local: scripts/ci-cd/.canister_deploys.yml
    inputs:
      src-folder: claimlink
  # Frontend deployments
  - local: scripts/ci-cd/.frontend_deploys.yml
    inputs:
      src-folder: claimlink_dashboard
      canister-name: claimlink_frontend

################################################################################
# Cache preparation
################################################################################
node cache:
  stage: preparation
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "frontend/claimlink_dashboard/{**,**/**,**/**/**}/*.{js,json,jsx,ts,tsx,md,mdx,css,html,svg}"
  extends: .node template
  script:
    - node --version
    - pnpm --version

################################################################################
# Linters
################################################################################

# See includes above for frontends lint

rust lint:
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "Cargo.{lock,toml}"
        - "backend/{**,**/**,**/**/**}/*.{rs,toml,lock}"
    - if: $CI_OPEN_MERGE_REQUESTS
      when: never
      changes:
        - "Cargo.{lock,toml}"
        - "backend/{**,**/**,**/**/**}/*.{rs,toml,lock}"
    - if: $CI_COMMIT_REF_NAME == "develop"
      changes:
        - "Cargo.{lock,toml}"
        - "backend/{**,**/**,**/**/**}/*.{rs,toml,lock}"
  extends: .rust template
  script:
    - cargo clippy
################################################################################
# Unit tests
################################################################################

# See includes above

################################################################################
# Builds
################################################################################

# See includes above for canister builds
